<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sub Counter</title>

<!-- 🔥 BLOCKY FONT -->
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

#counter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 90px;
  font-weight: 900;
  font-family: 'Anton', sans-serif;

  color: white;

  -webkit-text-stroke: 4px black;
  text-align: center;

  letter-spacing: 1px;
}
</style>
</head>

<body>

<div id="counter">Loading...</div>

<script>

const channelID = "UCSHFe4OT_G2YjxW28IDdjlw";
const API_KEY = "AIzaSyCVWFvY9cob_YfmoS3hP9S1iQ7FtCR429I";

let currentSubs = 0;
let targetSubs = 0;

// 🔥 SAFE API FETCH (no silent failures)
async function fetchSubs() {
  try {
    const url =
      `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelID}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    console.log("API:", data);

    const subs = data?.items?.[0]?.statistics?.subscriberCount;

    if (subs) {
      targetSubs = parseInt(subs);
    }

  } catch (e) {
    console.log("API error:", e);
  }
}

// 🌊 smooth easing (professional motion)
function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

let startValue = 0;
let endValue = 0;
let progress = 1;

function animate() {

  // 🔥 instant sync fix on first load
  if (currentSubs === 0 && targetSubs > 0) {
    currentSubs = targetSubs;
  }

  // detect change
  if (endValue !== targetSubs) {
    startValue = currentSubs;
    endValue = targetSubs;
    progress = 0;
  }

  if (progress < 1) {
    progress += 0.0045; // 🔥 slower, smoother, more “TV style”

    const eased = easeOutCubic(progress);

    currentSubs = startValue + (endValue - startValue) * eased;
  } else {
    currentSubs = targetSubs;
  }

  document.getElementById("counter").innerText =
    Math.floor(currentSubs).toLocaleString();

  requestAnimationFrame(animate);
}

// start loops
fetchSubs();
setInterval(fetchSubs, 5000);
animate();

</script>

</body>
</html>
