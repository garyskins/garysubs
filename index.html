<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sub Counter</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#counter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  font-size: 90px;
  font-weight: 900;
  color: white;

  -webkit-text-stroke: 4px black;
  text-align: center;
}
</style>
</head>

<body>

<div id="counter">0</div>

<script>

// 🔴 PUT YOUR CHANNEL ID HERE
const channelID = "UCSHFe4OT_G2YjxW28IDdjlw";

let currentSubs = 0;
let targetSubs = 0;

// ✅ SAFE FETCH (prevents NaN)
async function fetchSubs() {
  try {
    const res = await fetch(`https://api.socialcounts.org/youtube-live-subscriber-count/${channelID}`);
    const data = await res.json();

    // safety check
    if (!data || typeof data.est_sub !== "number") return;

    targetSubs = data.est_sub;

  } catch (e) {
    console.log("Fetch error:", e);
  }
}

// 🎯 smooth animation loop
function animate() {
  if (!isNaN(targetSubs)) {
    currentSubs += (targetSubs - currentSubs) * 0.08;

    if (Math.abs(targetSubs - currentSubs) < 0.5) {
      currentSubs = targetSubs;
    }
  }

  document.getElementById("counter").innerText =
    Math.floor(currentSubs).toLocaleString();

  requestAnimationFrame(animate);
}

// start
fetchSubs();
setInterval(fetchSubs, 2000);
animate();

</script>

</body>
</html>
