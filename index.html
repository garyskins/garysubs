<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sub Counter</title>

<!-- 🔥 RUBIK FONT -->
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

#counter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 90px;
  font-weight: 900;
  font-family: 'Rubik', Arial, sans-serif;

  text-align: center;
  letter-spacing: 1px;

  /* 🧱 METAL COLOR SPLIT */
  background: linear-gradient(to bottom,
    #ffffff 0%,
    #ffffff 50%,
    #b0b0b0 50%,
    #6f6f6f 100%
  );

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  /* 🖤 OUTLINE FOR CONTRAST */
  -webkit-text-stroke: 5px black;

  /* ✨ METAL DEPTH SHADOW */
  text-shadow:
    0px 3px 0px rgba(0,0,0,0.35),
    0px 6px 10px rgba(0,0,0,0.25);
}

}
</style>
</head>

<body>

<div id="counter">Loading...</div>

<script>

const channelID = "UCSHFe4OT_G2YjxW28IDdjlw";
const API_KEY = "AIzaSyCVWFvY9cob_YfmoS3hP9S1iQ7FtCR429I";

let currentSubs = 0;
let targetSubs = 0;

// 📡 fetch subs
async function fetchSubs() {
  try {
    const url =
      `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelID}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    const subs = data?.items?.[0]?.statistics?.subscriberCount;

    if (subs) {
      targetSubs = parseInt(subs);
    }

  } catch (e) {
    console.log("API error:", e);
  }
}

// 🌊 smooth ease-in-out (stream style)
function easeInOutSine(t) {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

let displayValue = 0;
let startValue = 0;
let endValue = 0;
let progress = 1;

function animate() {

  // detect change → restart smooth transition
  if (endValue !== targetSubs) {
    startValue = displayValue;
    endValue = targetSubs;
    progress = 0;
  }

  if (progress < 1) {
    progress += 0.005; // 🔥 smooth stream speed

    const eased = easeInOutSine(progress);

    displayValue = startValue + (endValue - startValue) * eased;
  } else {
    displayValue = targetSubs;
  }

  document.getElementById("counter").innerText =
    Math.floor(displayValue).toLocaleString();

  requestAnimationFrame(animate);
}

// start
fetchSubs();
setInterval(fetchSubs, 5000);
animate();

</script>

</body>
</html>
