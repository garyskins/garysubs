<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sub + View Counter</title>

<!-- 🔥 RUBIK FONT -->
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

/* 🔥 CENTER WRAPPER */
#wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 🧱 COMMON STYLE BASE */
.counter {
  font-size: 90px;
  font-weight: 900;
  font-family: 'Rubik', Arial, sans-serif;

  letter-spacing: 1px;

  background: linear-gradient(to bottom,
    #ffffff 0%,
    #ffffff 35%,
    #e9e9e9 45%,
    #bfc2c7 55%,
    #ffffff 62%,
    #9a9a9a 80%,
    #6f6f6f 100%
  );

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  -webkit-text-stroke: 5px black;

  text-shadow:
    0px 2px 0px rgba(0,0,0,0.25),
    0px 6px 12px rgba(0,0,0,0.22);
}

/* 👁 VIEW ROW */
#viewsRow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;

  margin-top: 10px;
  font-size: 55px;
}

/* 👁 ICON */
.eye {
  font-size: 45px;
  filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.4));
}

</style>
</head>

<body>

<div id="wrapper">

  <!-- SUB COUNT -->
  <div id="subs" class="counter">Loading...</div>

  <!-- VIEW COUNT -->
  <div id="viewsRow">
    <div class="eye">👁</div>
    <div id="views" class="counter" style="font-size:55px;">Loading...</div>
  </div>

</div>

<script>

const channelID = "UCSHFe4OT_G2YjxW28IDdjlw";
const API_KEY = "AIzaSyCVWFvY9cob_YfmoS3hP9S1iQ7FtCR429I";

let currentSubs = 0;
let targetSubs = 0;

let currentViews = 0;
let targetViews = 0;

// 📡 fetch YouTube stats
async function fetchStats() {
  try {
    const url =
      `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelID}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    const stats = data?.items?.[0]?.statistics;

    if (stats) {
      targetSubs = parseInt(stats.subscriberCount || 0);
      targetViews = parseInt(stats.viewCount || 0);
    }

  } catch (e) {
    console.log("API error:", e);
  }
}

// 🌊 smooth easing
function easeInOutSine(t) {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

let progress = 1;

// 🎮 ANIMATE SUBS
let subStart = 0;
let subEnd = 0;

// 🎮 ANIMATE VIEWS
let viewStart = 0;
let viewEnd = 0;

function animate() {

  // SUBS
  if (subEnd !== targetSubs) {
    subStart = currentSubs;
    subEnd = targetSubs;
    progress = 0;
  }

  if (progress < 1) {
    progress += 0.0045;

    const eased = easeInOutSine(progress);
    currentSubs = subStart + (subEnd - subStart) * eased;
    currentViews = viewStart + (viewEnd - viewStart) * eased;

  } else {
    currentSubs = targetSubs;
    currentViews = targetViews;
  }

  document.getElementById("subs").innerText =
    Math.floor(currentSubs).toLocaleString();

  document.getElementById("views").innerText =
    Math.floor(currentViews).toLocaleString();

  requestAnimationFrame(animate);
}

// start
fetchStats();
setInterval(fetchStats, 5000);
animate();

</script>

</body>
</html>
