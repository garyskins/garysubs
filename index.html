<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sub Counter</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#counter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 90px;
  font-weight: 900;
  color: white;

  -webkit-text-stroke: 4px black;
  text-align: center;
}
</style>
</head>

<body>

<div id="counter">Loading...</div>

<script>

// 🔴 PUT YOUR CHANNEL ID HERE
const channelID = "UCSHFe4OT_G2YjxW28IDdjlw";

let currentSubs = 0;
let targetSubs = 0;

// ✅ WORKING API (more stable than SocialCounts)
async function fetchSubs() {
  try {
    const res = await fetch(`https://mixerno.space/api/youtube-channel-counter/user/${channelID}`);
    const data = await res.json();

    if (
      data &&
      data.counts &&
      typeof data.counts.subscribers === "number"
    ) {
      targetSubs = data.counts.subscribers;
    }

  } catch (e) {
    console.log("Fetch error:", e);
  }
}

// 🎯 smooth animation
function animate() {
  if (!isNaN(targetSubs)) {
    currentSubs += (targetSubs - currentSubs) * 0.08;

    if (Math.abs(targetSubs - currentSubs) < 0.5) {
      currentSubs = targetSubs;
    }
  }

  document.getElementById("counter").innerText =
    Math.floor(currentSubs).toLocaleString();

  requestAnimationFrame(animate);
}

// start loops
fetchSubs();
setInterval(fetchSubs, 2000);
animate();

</script>

</body>
</html>
