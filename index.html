<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sub Counter</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

#counter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 90px;
  font-weight: 900;
  font-family: 'Nunito', Arial, sans-serif;

  color: white;

  -webkit-text-stroke: 4px black;
  text-align: center;

  letter-spacing: 1px;

}
</style>
</head>

<body>

<div id="counter">Loading...</div>

<script>

const channelID = "UCSHFe4OT_G2YjxW28IDdjlw";
const API_KEY = "AIzaSyCVWFvY9cob_YfmoS3hP9S1iQ7FtCR429I";

let currentSubs = 0;
let targetSubs = 0;

// 🔥 YouTube API fetch
async function fetchSubs() {
  try {
    const url =
      `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelID}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    const subs = data?.items?.[0]?.statistics?.subscriberCount;

    if (subs) {
      targetSubs = parseInt(subs);
    }

  } catch (e) {
    console.log("API error:", e);
  }
}

// 🌊 smooth ease-in-out (slow → fast → slow)
function easeInOutSine(t) {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

let startValue = 0;
let endValue = 0;
let progress = 1;

function animate() {

  // detect change
  if (endValue !== targetSubs) {
    startValue = currentSubs;
    endValue = targetSubs;
    progress = 0;
  }

  if (progress < 1) {
    progress += 0.006; // smooth speed control

    const eased = easeInOutSine(progress);

    currentSubs = startValue + (endValue - startValue) * eased;
  } else {
    currentSubs = targetSubs;
  }

  document.getElementById("counter").innerText =
    Math.floor(currentSubs).toLocaleString();

  requestAnimationFrame(animate);
}

// start
fetchSubs();
setInterval(fetchSubs, 5000);
animate();

</script>

</body>
</html>
